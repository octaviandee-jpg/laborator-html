<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>TechZone - Contact</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Contact</h1>
    <nav>
        <a href="index.html">Acasă</a>
        <a href="telefoane.html">Telefoane</a>
        <a href="laptopuri.html">Laptopuri</a>
        <a href="despre.html">Despre</a>
        <a href="contact.html">Contact</a>
    </nav>
</header>

<section class="formular-container">

    <form onsubmit="return confirmareTrimitere()">

        <label for="nume">Nume:</label>
        <input type="text" id="nume" name="nume" required>

        <label for="prenume">Prenume:</label>
        <input type="text" id="prenume" name="prenume" required>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required>

        <label for="telefon">Număr de telefon (opțional):</label>
        <input type="tel" id="telefon" name="telefon"
               value="+373 "
		pattern="\+373\s?[0-9]{8}"
               placeholder="+373 6XXXXXXX">

        <label for="mesaj">Mesaj:</label>
        <textarea id="mesaj" name="mesaj" required></textarea>

        <div class="butoane">
            <button type="submit" class="trimite">Trimite</button>
            <button type="reset" class="sterge">Șterge</button>
        </div>

    </form>

</section>

<footer>
    <p>© 2026 TechZone</p>
</footer>

<script>
function confirmareTrimitere() {
    return confirm("Sigur doriți să trimiteți mesajul?");
}
</script>

</body>
</html>
